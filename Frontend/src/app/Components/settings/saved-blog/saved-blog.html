


 


<html>

<head>
  <!-- <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet"> -->
</head>

<body>

  <!--  LANDING PAGE  -->
  <div class="page active" id="page-landing">

   




    <section class="posts-preview">
      <div class="section-head" style="text-align:left;margin-bottom:2rem; margin-left: 20px;">
        <h2 style="font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--ink);">All Saved Post</h2>
      </div>
      <a (click)="gotodashboard()" class="btn  flex justify-start">← Back to Dashboard</a>
      
      <div class="posts-grid">
        <div class="mini-card" *ngFor="let blog of blogposts">

          <img [src]="blog?.image ? apiUrl + blog.image : 'assets/default-upld-image2.png'" alt="">
          <div class="mini-card-body">
            <div class="mini-cat">{{blog.title}}</div>
            <div class="mini-title">{{blog.content}}</div>
            <div class="mini-meta"> 
              <span >by {{blog.author}} </span>
          
              <span (click)="saveBlog(blog)">⛊  </span>
            </div>
            <span class="mini-meta">{{blog.createdDate}}</span>
            </div>
          </div>
        </div>
  
    </section>





  </div><!-- end landing -->




</body>

</html>
